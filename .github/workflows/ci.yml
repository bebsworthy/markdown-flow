name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  engine:
    name: engine (packages/markflow)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies (monorepo, hoisted)
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high || true

      - name: Validate lockfile
        run: npx lockfile-lint --type npm --path package-lock.json --validate-https --allowed-hosts npm

      - name: Lint
        run: npm run lint -w packages/markflow

      - name: Test
        run: npm test -w packages/markflow -- --run

      - name: Build
        run: npm run build -w packages/markflow

      - name: Generate SBOM
        run: npx @cyclonedx/cyclonedx-npm --output-file sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  tui:
    name: tui (packages/markflow-tui)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies (monorepo, hoisted)
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high || true

      - name: Build engine (workspace dependency)
        run: npm run build -w packages/markflow

      - name: Lint
        run: npm run lint -w packages/markflow-tui

      - name: Test
        run: npm test -w packages/markflow-tui -- --run
        env:
          MARKFLOW_PERF_MULT: "2"

      - name: Build
        run: npm run build -w packages/markflow-tui
