name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry-run:
        description: "Dry run (no actual publish)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build engine (needed for TUI lint)
        run: npm run build -w markflow-cli

      - name: Lint
        run: npm run lint

      - name: Test engine
        run: npm test -w markflow-cli -- --run

      - name: Test TUI
        run: npm test -w packages/markflow-tui -- --run
        env:
          MARKFLOW_PERF_MULT: "2"

  publish:
    name: Publish
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -w markflow-cli

      - name: Bump version
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "📦 Version: ${VERSION}"
        working-directory: packages/markflow

      - name: Publish (dry run)
        if: inputs.dry-run
        run: npm publish --provenance --access public --dry-run
        working-directory: packages/markflow

      - name: Publish
        if: ${{ !inputs.dry-run }}
        run: npm publish --provenance --access public
        working-directory: packages/markflow

      - name: Summary
        run: |
          echo "### Published markflow-cli@${VERSION}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            echo "⚠️ **Dry run** — nothing was actually published" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Published to https://www.npmjs.com/package/markflow-cli" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "npx markflow-cli --help" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
